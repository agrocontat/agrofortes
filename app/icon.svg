  <line x1="16" y1="15" x2="21" y2="18" stroke="#0D3B2E" stroke-width="0.8" stroke-linecap="round"/>
  <line x1="16" y1="19" x2="12" y2="21" stroke="#0D3B2E" stroke-width="0.8" stroke-linecap="round"/>
  <line x1="16" y1="19" x2="20" y2="21" stroke="#0D3B2E" stroke-width="0.8" stroke-linecap="round"/>
</svg>
